name: CI

on: [push, pull_request]

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install ARM toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi
      - name: Build firmware
        run: ./build.sh

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./picohost[dev]
      - name: Test with pytest
        run: |
          cd picohost
          pytest
      - name: Upload coverage report
        if: github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
      - name: Upload test results
        if: ${{ !cancelled() && github.actor != 'dependabot[bot]' }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: EIGSEP/pico-firmware
          file: picohost/junit.xml

  emulator-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all apps have corresponding emulators
        run: |
          missing=0
          # Extract app names from pico_multi.h APP_ defines
          apps=$(grep -oP '(?<=#define APP_)\w+' src/pico_multi.h | tr '[:upper:]' '[:lower:]')
          for app in $apps; do
            # Allow shared emulators via "// emulator: <name>" annotation
            alias=$(grep -iP "#define APP_${app}\b" src/pico_multi.h | grep -oP '//\s*emulator:\s*\K\w+' || true)
            target=${alias:-$app}
            if [ ! -f "picohost/src/picohost/emulators/${target}.py" ]; then
              echo "::error::App '${app}' has no emulator at picohost/src/picohost/emulators/${target}.py"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi
          echo "All apps have corresponding emulators."
