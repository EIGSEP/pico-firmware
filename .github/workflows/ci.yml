name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install ARM toolchain
        uses: awalsh128/cache-apt-pkgs-action@2c09a5e66da6c8016428a2172bd76e5e4f14bb17
        with:
          packages: cmake gcc-arm-none-eabi libnewlib-arm-none-eabi
          version: 1.0
      - name: Build firmware
        run: ./build.sh

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./picohost[dev]
      - name: Test with pytest
        run: |
          cd picohost
          pytest
      - name: Upload coverage report
        if: github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
      - name: Upload test results
        if: ${{ !cancelled() && github.actor != 'dependabot[bot]' }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: EIGSEP/pico-firmware
          file: picohost/junit.xml

  emulator-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Check all apps have corresponding emulators
        run: |
          missing=0
          # Extract app names from pico_multi.h APP_ defines
          apps=$(grep -oP '(?<=#define APP_)\w+' src/pico_multi.h | tr '[:upper:]' '[:lower:]')
          for app in $apps; do
            # Allow shared emulators via "// emulator: <name>" annotation
            alias=$(grep -iP "#define APP_${app}\b" src/pico_multi.h | grep -oP '//\s*emulator:\s*\K\w+' || true)
            target=${alias:-$app}
            if [ ! -f "picohost/src/picohost/emulators/${target}.py" ]; then
              echo "::error::App '${app}' has no emulator at picohost/src/picohost/emulators/${target}.py"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi
          echo "All apps have corresponding emulators."
