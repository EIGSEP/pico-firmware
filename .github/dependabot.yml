version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  - package-ecosystem: "pip"
    directory: "/picohost"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
